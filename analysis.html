<!doctype html>
<html lang="id" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Dashboard analisis kelayakan OTEC di perairan Selatan Bali."
    />
    <title>myOTEC — Dashboard Analisis</title>
    <link
      rel="icon"
      href="assets/dark_copy_horizontal.png" type="image/png"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="analysis-spatial">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="logo">MY<span>OTEC</span></span>
        <button class="sidebar-close" id="sidebar-close" aria-label="Close">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
          >
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </button>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html">Dashboard</a>
        <a href="analysis.html" class="active">Analisis</a>
        <a href="compare.html">Compare</a>
      </nav>
    </aside>

    <nav class="navbar">
      <div class="navbar-inner">
        <div class="nav-left">
          <button class="menu-toggle" id="menu-toggle" aria-label="Menu">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            >
              <path d="M3 12h18M3 6h18M3 18h18" />
            </svg>
          </button>
          <a href="index.html" class="logo-link"><img src="assets/dark_copy_horizontal.png" alt="myOTEC" class="logo-img" style="height:65px; vertical-align:middle;"/></a>
        </div>
        <div class="nav-right" id="top-nav-links">
          <a href="compare.html" class="nav-cta" id="nav-compare-link" style="margin-right: 0.5rem; font-size: 0.7rem">COMPARE</a>
          <script>
             const urlParamsNav = new URLSearchParams(window.location.search);
             const reg = urlParamsNav.get('region');
             if(reg) {
               document.getElementById('nav-compare-link').href = `compare.html?region=${reg}`;
             }
          </script>
        </div>
      </div>
    </nav>

    <a href="dashboard.html" class="spatial-back-link">
      <svg
        width="14"
        height="14"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
      Kembali
    </a>

    <nav class="spatial-category-nav" aria-label="Kategori analisis">
      <div class="spatial-nav-inner">
        <div class="nav-dropdown" data-category="thermal">
          <button
            type="button"
            class="nav-dropdown-trigger"
            aria-expanded="false"
            aria-haspopup="true"
          >
            Dinamika Termal Laut
            <svg
              class="chevron"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M6 9l6 6 6-6" />
            </svg>
          </button>
          <div class="nav-dropdown-menu" role="menu">
            <button
              type="button"
              class="nav-dropdown-item active"
              data-page="sst_map"
              role="menuitem"
            >
              Suhu Permukaan Laut (SST)
            </button>
            <button
              type="button"
              class="nav-dropdown-item"
              data-page="deep_sea_temp"
              role="menuitem"
            >
              Profil Suhu Kolom Air
            </button>
            <button
              type="button"
              class="nav-dropdown-item"
              data-page="thermal_gradient"
              role="menuitem"
            >
              Gradien Termal (Delta T)
            </button>
          </div>
        </div>
        <div class="nav-dropdown" data-category="physical">
          <button
            type="button"
            class="nav-dropdown-trigger"
            aria-expanded="false"
            aria-haspopup="true"
          >
            Parameter Oseanografi Fisik
            <svg
              class="chevron"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M6 9l6 6 6-6" />
            </svg>
          </button>
          <div class="nav-dropdown-menu" role="menu">
            <button
              type="button"
              class="nav-dropdown-item"
              data-page="bathymetry"
              role="menuitem"
            >
              Batimetri
            </button>
            <button
              type="button"
              class="nav-dropdown-item"
              data-page="salinity"
              role="menuitem"
            >
              Salinitas
            </button>
            <button
              type="button"
              class="nav-dropdown-item"
              data-page="currents"
              role="menuitem"
            >
              Arus
            </button>
            <button
              type="button"
              class="nav-dropdown-item"
              data-page="waves"
              role="menuitem"
            >
              Kondisi Gelombang
            </button>
          </div>
        </div>
        <div class="nav-dropdown" data-category="feasibility">
          <button
            type="button"
            class="nav-dropdown-trigger"
            aria-expanded="false"
            aria-haspopup="true"
          >
            Evaluasi Kelayakan OTEC
            <svg
              class="chevron"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M6 9l6 6 6-6" />
            </svg>
          </button>
          <div class="nav-dropdown-menu" role="menu">
            <button
              type="button"
              class="nav-dropdown-item"
              data-page="otec_eval"
              role="menuitem"
            >
              Evaluasi &amp; Zonasi OTEC
            </button>
            <button
              type="button"
              class="nav-dropdown-item"
              data-page="subsea_infrastructure"
              role="menuitem"
            >
              Infrastruktur Bawah Laut
            </button>
          </div>
        </div>
      </div>
    </nav>

    <main class="map-canvas" id="map-canvas">
      <div class="map-title-badge" id="map-title-badge">
        <span class="label" id="page-label">SEA SURFACE TEMPERATURE</span>
        <h2 id="page-title">Suhu Permukaan Laut (SST)</h2>
      </div>

      <div class="page-panel active" data-page="sst_map">
        <div id="map-sst"></div>
      </div>
      <div class="page-panel" data-page="deep_sea_temp">
        <div id="map-deep"></div>
      </div>
      <div class="page-panel" data-page="thermal_gradient">
        <div id="map-delta"></div>
      </div>
      <div class="page-panel" data-page="bathymetry">
        <div class="bathy-map-wrap" id="bathy-map-wrap">
          <div id="map-bathymetry"></div>
        </div>
      </div>
      <div class="page-panel" data-page="salinity">
        <div id="map-salinity"></div>
      </div>
      <div class="page-panel" data-page="currents">
        <div id="map-currents"></div>
      </div>
      <div class="page-panel" data-page="waves">
        <div id="map-waves"></div>
        <div class="waves-placeholder" id="waves-placeholder">
          <p>
            Copernicus Marine Service &mdash; Global Ocean Waves Analysis
            (1/12&deg;).<br />Layer gelombang akan dimuat setelah ekspor data
            CMEMS.
          </p>
        </div>
      </div>
      <div class="page-panel" data-page="otec_eval">
        <div id="map-otec-eval"></div>
      </div>
      <div class="page-panel" data-page="subsea_infrastructure">
        <div id="map-infrastructure"></div>
      </div>

      <aside class="float-panel float-panel-left" id="info-panel">
        <div class="float-panel-header">
          <h4>Informasi &amp; Statistik</h4>
          <button
            type="button"
            class="float-panel-toggle"
            id="info-panel-collapse"
            aria-label="Sembunyikan panel kiri"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </button>
        </div>
        <div class="float-panel-body" id="info-panel-body"></div>
      </aside>
      <button
        type="button"
        class="float-panel-fab float-panel-fab-left"
        id="info-panel-expand"
        aria-label="Tampilkan panel kiri"
      >
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M9 18l6-6-6-6" />
        </svg>
      </button>

      <aside class="float-panel float-panel-right" id="controls-panel">
        <div class="float-panel-header">
          <h4>Kontrol Peta</h4>
          <button
            type="button"
            class="float-panel-toggle"
            id="controls-panel-collapse"
            aria-label="Sembunyikan panel kanan"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M9 18l6-6-6-6" />
            </svg>
          </button>
        </div>
        <div class="float-panel-body" id="controls-panel-body"></div>
      </aside>
      <button
        type="button"
        class="float-panel-fab float-panel-fab-right"
        id="controls-panel-expand"
        aria-label="Tampilkan panel kanan"
      >
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M15 18l-6-6 6-6" />
        </svg>
      </button>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
    <script src="js/dynamic_loader.js" data-main="js/analysis.js"></script>
  </body>
</html>
